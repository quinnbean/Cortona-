<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    
    .subtitle {
      font-size: 11px;
      color: #888;
    }
    
    .status {
      background: #252542;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .status-row:last-child {
      margin-bottom: 0;
    }
    
    .status-label {
      color: #888;
      font-size: 12px;
    }
    
    .status-value {
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-value.connected {
      color: #4CAF50;
    }
    
    .status-value.disconnected {
      color: #f44336;
    }
    
    .sites {
      margin-bottom: 12px;
    }
    
    .sites-title {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    
    .site-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .site-badge {
      background: #333;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #aaa;
    }
    
    .site-badge.active {
      background: #1b5e20;
      color: #81c784;
    }
    
    .footer {
      text-align: center;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    
    .footer a {
      color: #667eea;
      text-decoration: none;
      font-size: 11px;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎯</div>
    <div>
      <div class="title">Cortona AI Watcher</div>
      <div class="subtitle">Monitoring AI assistants</div>
    </div>
  </div>
  
  <div class="status">
    <div class="status-row">
      <span class="status-label">Cortona Desktop</span>
      <span class="status-value" id="cortona-status">Checking...</span>
    </div>
    <div class="status-row">
      <span class="status-label">This Page</span>
      <span class="status-value" id="page-status">-</span>
    </div>
  </div>
  
  <div class="sites">
    <div class="sites-title">Supported AI Sites</div>
    <div class="site-list">
      <span class="site-badge">ChatGPT</span>
      <span class="site-badge">Claude</span>
      <span class="site-badge">Gemini</span>
      <span class="site-badge">Perplexity</span>
      <span class="site-badge">Poe</span>
    </div>
  </div>
  
  <div class="footer">
    <a href="http://localhost:5050" target="_blank">Open Cortona Dashboard</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
